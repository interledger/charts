#
# Chart for the Interledger App Wallet backend.
#

# Configuration that will be used during the migrations.
# Migrations will run as a separate job before the application starts using helm hooks.
# See templates/initialisation.yaml for more details on how the job is created.

# You can override the version of the image used used across the chart here.
# If you specify an image in the deployment or initialisation sections specifically
# those will take precedence over this one.
imageOverride:
  repository: europe-west4-docker.pkg.dev/wallet-451208/interledger-app
  name: backend
  # tag: vA.B.C
  # by default tag will be the application version

initialisation: 
  serviceAccountName: ""
  backend:
    urlSecretRef: "dbBackendMigrationsURL"
  pacioli:
    urlSecretRef: "dbPacioliMigrationsURL"
  rafiki_backend:
    urlSecretRef: "dbRafikiBackendURL"
  rafiki_auth:
    urlSecretRef: "dbRafikiAuthURL"

  # One can override the image and tag used for the initialisation job specifically here.
  # otherwise it will use the imageOverride values above.
  # image:
  #   repository: europe-west4-docker.pkg.dev/wallet-451208/interledger-app
  #   name: backend
  #   tag: vA.B.C
  imagePullPolicy: Always

database:
  host: "postgresql-host"
  port: "5432"
  backend:
    urlSecretRef: "dbBackendURL"
  pacioli:
    urlSecretRef: "dbPacioliURL"
  rafiki_backend:
    urlSecretRef: "dbRafikiBackendURL"
  rafiki_auth:
    urlSecretRef: "dbRafikiAuthURL"

config:
  environment: dev
  log_level: "info"
  port: "8080"
  usd_ledger_id: "1"
  noop_equity_account_id: "00000000-0000-0000-0000-000000000000"
  google_oauth2_client_id: "google_oauth"
  authorisation_port: "8082"
  open_payments_port: "8081"
  apple_app_id: ""
  android_package_name: ""
  android_sha256: ""
  
  admin:
    policy_aud_ref: adminPortalCloudFlarePolicyAud
    team_domain_ref: adminPortalCloudflareTeamDomain

  twitter:
    client:
      id: "not_used"
      secret: "not_used"
      bearer: "not_used"
      redirect: "not_used"  

  smarty:
    auth:
      id: "not_used"
      token: "not_used"

  # A comma separated list of region codes
  region_blocking:
    blocked_regions: ""
    allowed_wallet_ids: ""

  twilio:
    account_sid_ref: twilioAccountSID
    service_sid_ref: twilioServiceSID
    account_token_ref: twilioAccountToken

  zendesk:
    user: "support@interledger-app.dev"
    token_ref: "zendeskToken"

  kratos:
    url: "http://kratos.wallet:4433"
    admin_url: "http://kratos.wallet:4434"
  
  rafiki:
    graphql:
      auth_url: "http://rafiki-auth:3003/graphql"
      backend_url: "http://rafiki-backend:3001/graphql"

  temporal:
    url: "temporal:7233"

  otel:
    exporter_otlp_endpoint: "grpc://api.honeycomb.io:443"
    exporter_otlp_headers_ref: "otelExporterHeaders" # Value will be something like "x-honeycomb-team=0000000000000000000000"
    service_name: "backend"

  vault:
    url: "http://vault:8200"
    transit_engine_path: "transit/prod/backend"

  astra:
    client_id_ref: "astraClientID"
    client_secret_ref: "astraClientSecret"
    webhook_bearer_token_ref: "astraWebhookBearerToken"
    # note: what about account number etc?

  gatehub:
    # Toggle Gatehub-specific validation and runtime config requirements.
    enabled: "true" # controls helm validation of gatehub configuration

    # Base URLs for Gatehub APIs; must be set explicitly per environment.
    # Example (sandbox): "https://api.sandbox.gatehub.net"
    # Example (local/mock): "http://mockgatehub:8080"
    # Base API URL used for Gatehub auth/core/id API calls.
    api_base_url: ""
    # Frontend widget URL used to build onboarding links for users.
    onboarding_base_url: ""
    # Frontend widget URL used to build deposit/withdraw on-off-ramp links.
    on_off_ramp_base_url: ""
    # Secondary webhook endpoint for unknown Gatehub users (cards fallback).
    # This field is optional.
    fallback_webhook_url: ""

    # Gatehub organization UUID used for org-level configuration updates.
    organization_id: ""
    # Managed Gatehub user UUID used for specific backfill/payment operations. Used for "backfilling".
    sending_user_id: ""
    # Sending wallet address tied to the managed Gatehub sending user. Used for "backfilling".
    sending_user_address: ""
    # Internal EUR operations account ID used in wallet ledger movements.
    eur_ops_account: ""
    # Internal EUR ledger ID used for Gatehub reserve/assign posting.
    eur_ops_ledger_id: ""
    # OAuth client ID for Gatehub on-off-ramp token issuance.
    on_off_ramp_client_id: ""
    # OAuth client ID for Gatehub onboarding token issuance.
    onboarding_client_id: ""
    # OAuth client ID for Gatehub exchange token issuance.
    exchange_client_id: ""
    # Gatehub card product code applied when creating card accounts/cards.
    card_account_product_code: ""

    # References to Kubernetes secrets where sensitive Gatehub configuration values are stored
    # Secret key containing Gatehub app ID header value.
    app_id_ref: "gatehubAppID"
    # Secret key containing Gatehub API signing secret.
    secret_ref: "gatehubSecret"
    # Secret key containing hex webhook signing secret for validation.
    webhook_secret_ref: "gatehubWebhookSecret"
    # Secret key containing Gatehub gateway UUID for user-hub linking.
    gateway_id_ref: "gatehubGatewayId"
    # Secret key containing EUR vault UUID used in hosted transactions.
    paywiser_euro_vault_id_ref: "gatehubPaywiserEuroVaultId"
    # Secret key containing Gatehub card app ID header value.
    card_app_id_ref: "gatehubCardAppId"

  chimoney:
    webhook_secret_ref: "chimoneyWebhookSecret"
    token_ref: "chimoneyToken"

  sendgrid:
    api_key_ref: "sendgridApiKey"


  pusher:
    addr_ref: "pusherAddr"

  segment:
    key_ref: "segmentKey"

  slack:
    client_id_ref: "slackClientID"
    client_secret_ref: "slackClientSecret"
    signing_secret_ref: "slackSigningSecret"
    token_ref: "slackToken"
  
  basis_theory:
    api_key_ref: "basisTheoryApiKey"
    token_ref: "basisTheoryToken"

  persona:
    token_ref: "personaToken"
    webhook_token_ref: "personaWebhookToken"

  cdn:
    key_ref: "cdnKey"
  
  xago:
    # Base URL for Xago business API endpoints.
    api_base_url: ""
    # Base URL for Xago identity/login endpoint.
    identity_base_url: ""
    # Xago login policy ID used to request access tokens.
    policy_id: ""
    # Secret key containing Xago API secret key credential.
    api_secret_ref: "xagoApiSecret"
    # Secret key containing Xago API public key credential.
    api_public_key_ref: "xagoApiPublicKey"

  sentry:
    dsn_ref: "sentryDSN"
  
  pti: # FIANT configuration
    # Enables PTI runtime integrations and strict PTI env checks.
    enabled: "false"
    # Non-secret PTI API base URL fallback for configmap-driven setups.
    base_url: "https://pti-base-url.com"
    # Non-secret PTI SDK URL used by clients to load the PTI widget script.
    sdk_url: "https://sdk.staging.fiant.io/latest/index.js"
    # Non-secret PTI forms URL used by clients to host PTI widget forms.
    forms_url: "https://forms.staging.fiant.io"
    # Secret key containing PTI private JWK used for request/webhook crypto.
    jwk_ref: "ptiJwk"
    # Secret key containing PTI public JWK used for webhook signature checks.
    public_key_jwk_ref: "ptiPublicKeyJwk"
    # Secret key containing PTI client UUID for API/webhook validation.
    client_id_ref: "ptiClientID"

  redis_url_ref: "redisURL"

server:
  enabled: true
  minReadySeconds: 10
  replicaCount: 2
  name: server
  imagePullPolicy: Always
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3
    httpGet:
      path: /healthz
      port: 8080
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3      
    httpGet:
      path: /healthz
      port: 8080
  args:
    - "start"
  envFrom:
    - configMapRef:
        # Ensures that the configMap reference name is the one generated by the common chart
        name: '{{ include "common.fullname" . }}-config'        
  env:
    -  name: PGSSLMODE
       value: disable
    -  name: DB_URL
       valueFrom:
          secretKeyRef:
            name: '{{ include "common.fullname" . }}'
            key: "{{ .Values.database.backend.urlSecretRef }}"
    -  name: PACIOLI_DB_URL
       valueFrom:
          secretKeyRef:
            name: '{{ include "common.fullname" . }}'
            key: "{{ .Values.database.pacioli.urlSecretRef }}"
    -  name: DB_URL_WITH_CERTS
       valueFrom:
          secretKeyRef:
            name: '{{ include "common.fullname" . }}'
            key: "{{ .Values.database.backend.urlSecretRef }}"
    -  name: PACIOLI_DB_URL_WITH_CERTS
