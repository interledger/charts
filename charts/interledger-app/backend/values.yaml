  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 1000Mi
      cpu: 1000m
  ports:
    - name: grpc
      containerPort: 8443
    - name: admin
      containerPort: 8448
    - name: http
      containerPort: 8080
  service:
    grpc:
      name: service-grpc
      annotations:
        traefik.ingress.kubernetes.io/service.serversscheme: h2c
      type: ClusterIP
      ports:
        # Private gRPC Server (Used by the Admin Portal)
        - port: 8448
          targetPort: 8448
          protocol: TCP
          name: admin
        # Public gRPC Server (Used by Mobile & External applications)
        - port: 8443
          targetPort: 8443
          protocol: TCP
          name: grpc
          appProtocol: HTTP2
    http:
      name: service-http
      type: ClusterIP
      ports:
        # Handling of webhooks
        - port: 8080
          targetPort: 8080
          protocol: TCP
          name: http
  podDisruptionBudget:
    enabled: true
    annotations: {}
    minAvailable: 1
  topologySpreadConstraints:
