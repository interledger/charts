suite: Wallet Frontend - Check configmap
templates:
  - configMap.server.yaml
set:
  fullnameOverride: wallet-frontend
release:
  name: wallet-frontend
tests:
  - it: 'should contain LOG_LEVEL in data'
    set:
      config:
        log_level: "debug"
    asserts:
      - equal:
          path: data.LOG_LEVEL
          value: "debug"
  - it: 'should contain LOG_PRETTY in data'
    set:
      config:
        log_pretty: true
    asserts:
      - equal:
          path: data.LOG_PRETTY
          value: "true"
  - it: 'should contain default LOG_PRETTY as false'
    set:
      config:
        log_pretty: false
    asserts:
      - equal:
          path: data.LOG_PRETTY
          value: "false"
  - it: 'should contain FYNBOS_ENV in data'
    set:
      config:
        environment: "production"
    asserts:
      - equal:
          path: data.FYNBOS_ENV
          value: "production"
  - it: 'should contain BACKEND_GRPC_URL in data'
    set:
      config:
        backend:
          grpc:
            url: "http://backend:8443"
    asserts:
      - equal:
          path: data.BACKEND_GRPC_URL
          value: "http://backend:8443"
  - it: 'should contain PTI_CLIENT_ID in data'
    set:
      config:
        pti:
          client_id: "04d3e1b5-96d4-47e4-9eaa-13e9b4b0f219"
    asserts:
      - equal:
          path: data.PTI_CLIENT_ID
          value: "04d3e1b5-96d4-47e4-9eaa-13e9b4b0f219"
  - it: 'should contain PTI_SDK_URL in data'
    set:
      config:
        pti:
          sdk_url: "https://sdk.staging.fiant.io/latest/index.js"
    asserts:
      - equal:
          path: data.PTI_SDK_URL
          value: "https://sdk.staging.fiant.io/latest/index.js"
  - it: 'should contain PTI_FORMS_URL in data'
    set:
      config:
        pti:
          forms_url: "https://forms.staging.fiant.io"
    asserts:
      - equal:
          path: data.PTI_FORMS_URL
          value: "https://forms.staging.fiant.io"
