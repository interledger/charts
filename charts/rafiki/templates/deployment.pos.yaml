{{- define "pos.deployment" -}}
{{- $top := first . }}
{{- $cfgObj := include "common.configMapper" (list $top $top.Values.configMaps.pos "rafiki.pos.ConfigMap") | fromYaml -}}
{{- $dataHash := $cfgObj.data | toJson | sha256sum -}}
spec:
  template:
    metadata:
      annotations:
        ilf-configmap-pos-sha256: {{ $dataHash | quote }}
{{- end }}
{{- if .Values.config.pos.enabled }}
{{- include "common.deployment" (list . .Values.deployments.pos .Values.deployments.pos.autoscaling .Values.deployments.pos.serviceAccount "pos.deployment") }}
{{- end }}
