# pg-autogrant default values

# CronJob schedule (default: 6:00 AM UTC daily)
schedule: "0 6 * * *"

# Job history retention
failedJobsHistoryLimit: 3
successfulJobsHistoryLimit: 1

# Time limit for each job run
activeDeadlineSeconds: 300
backoffLimit: 3

# Seconds to keep finished Job pods before automatic cleanup
ttlSecondsAfterFinished: 600

image:
  repository: postgres
  tag: "18-alpine"

# Kubernetes service account used by the Job pod.
# Must have Cloud SQL Client IAM binding for the proxy sidecar.
serviceAccountName: ""

# Reference to a K8s Secret containing PostgreSQL admin credentials.
credentialsSecret:
  name: "setup-db-credentials"
  userKey: "user_name"
  passwordKey: "password"

# Cloud SQL Auth Proxy sidecar configuration.
# Set enabled=false when the database is reachable directly (e.g. local/dev).
cloudSqlProxy:
  enabled: true
  image:
    repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
    tag: "2.21.2"
  # Full instance connection name: project:region:instance
  instanceConnectionName: ""
  privateIp: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# PostgreSQL connection settings (target host for psql).
# When cloudSqlProxy.enabled=true the proxy listens on localhost and handles TLS.
# When cloudSqlProxy.enabled=false these point directly at the database;
# set sslmode to "require" or stricter to avoid plaintext credentials on the wire.
connection:
  host: "localhost"
  port: "5432"
  sslmode: "disable"

# Roles to create (idempotently) before applying grants.
roles:
  - name: rafiki_auth
    login: true
  - name: rafiki_backend
    login: true
  - name: wallet_kratos
    login: true
  - name: wallet_backend
    login: true
  - name: temporal
    login: true
  - name: temporal_visibility
    login: true
  - name: pacioli
    login: true
  - name: firefighter
    login: true
  - name: support_ro
    login: true


# Databases to manage. For each database the chart will assigned the following grants to the database owner role:
# - CONNECT on the database
# - USAGE on the public schema
# - CREATE on the public schema
# - TEMP on the database
# - ALL on all tables/sequences/functions in the public schema
databases:
  - name: rafiki_auth
    owner: rafiki_auth
  - name: rafiki_backend
    owner: rafiki_backend
  - name: wallet_kratos
    owner: wallet_kratos
  - name: wallet_backend
    owner: wallet_backend
  - name: temporal
    owner: temporal
  - name: temporal_visibility
    owner: temporal_visibility
  - name: pacioli
    owner: pacioli

# Extra role memberships beyond the per-database defaults.
# Example: wallet_backend needs the pacioli role for cross-database access.
crossGrants:
  - role: wallet_backend
    memberOf: [pacioli]
  - role: firefighter
    memberOf: [rafiki_auth, rafiki_backend, wallet_kratos, wallet_backend, temporal, temporal_visibility, pacioli]

# Specific grants with explicit level control.
# Each entry must specify a 'level' that determines the SQL generated:
#
#   level: database  → GRANT {privileges} ON DATABASE "{database}" TO {role};
#   level: schema    → GRANT {privileges} ON SCHEMA {schema} TO {role};  (connected to {database})
#   level: object    → GRANT {privileges} ON ALL {objectType}S IN SCHEMA {schema} TO {role};
#                      + ALTER DEFAULT PRIVILEGES IN SCHEMA {schema} GRANT {privileges} ON {objectType}S TO {role};
#
specificGrants:
  # --- rafiki_auth ---
  - role: support_ro
    level: database
    database: rafiki_auth
    privileges: [CONNECT]
  - role: support_ro
    level: schema
    database: rafiki_auth
    schema: public
    privileges: [USAGE]
  - role: support_ro
    level: object
    database: rafiki_auth
    schema: public
    objectType: [TABLE]
    privileges: [SELECT]

  # --- rafiki_backend ---
  - role: support_ro
    level: database
    database: rafiki_backend
    privileges: [CONNECT]
  - role: support_ro
    level: schema
    database: rafiki_backend
    schema: public
    privileges: [USAGE]
  - role: support_ro
    level: object
    database: rafiki_backend
    schema: public
    objectType: [TABLE]
    privileges: [SELECT]

  # --- wallet_kratos ---
  - role: support_ro
    level: database
    database: wallet_kratos
    privileges: [CONNECT]
  - role: support_ro
    level: schema
    database: wallet_kratos
    schema: public
    privileges: [USAGE]
  - role: support_ro
    level: object
    database: wallet_kratos
    schema: public
    objectType: [TABLE]
    privileges: [SELECT]

  # --- wallet_backend ---
  - role: support_ro
    level: database
    database: wallet_backend
    privileges: [CONNECT]
  - role: support_ro
    level: schema
    database: wallet_backend
    schema: public
    privileges: [USAGE]
  - role: support_ro
    level: object
    database: wallet_backend
    schema: public
    objectType: [TABLE]
    privileges: [SELECT]

  # --- temporal ---
  - role: support_ro
    level: database
    database: temporal
    privileges: [CONNECT]
  - role: support_ro
    level: schema
    database: temporal
    schema: public
    privileges: [USAGE]
  - role: support_ro
    level: object
    database: temporal
    schema: public
    objectType: [TABLE]
    privileges: [SELECT]

  # --- temporal_visibility ---
  - role: support_ro
    level: database
    database: temporal_visibility
    privileges: [CONNECT]
  - role: support_ro
    level: schema
    database: temporal_visibility
    schema: public
    privileges: [USAGE]
  - role: support_ro
    level: object
    database: temporal_visibility
    schema: public
    objectType: [TABLE]
    privileges: [SELECT]

  # --- pacioli ---
  - role: support_ro
    level: database
    database: pacioli
    privileges: [CONNECT]
  - role: support_ro
    level: schema
    database: pacioli
    schema: public
    privileges: [USAGE]
  - role: support_ro
    level: object
    database: pacioli
    schema: public
    objectType: [TABLE]
    privileges: [SELECT]
resources:
  requests:
    memory: 32Mi
    cpu: 10m
  limits:
    memory: 64Mi
    cpu: 100m
