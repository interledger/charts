# pg-autogrant chart defaults
#
# This file intentionally contains project-agnostic defaults.
# No roles, databases, or grants are configured by default.
#
# See values.example.yaml for a complete fictional example.

# CronJob schedule (default: 6:00 AM UTC daily)
schedule: "0 6 * * *"

# Job history retention
failedJobsHistoryLimit: 3
successfulJobsHistoryLimit: 1

# Time limit for each job run
activeDeadlineSeconds: 300
backoffLimit: 3

# Seconds to keep finished Job pods before automatic cleanup
ttlSecondsAfterFinished: 600

image:
  repository: postgres
  tag: "18-alpine"

# Optional Kubernetes service account for the Job pod.
# Example: "db-admin"
serviceAccountName: ""

# Reference to a Kubernetes Secret containing PostgreSQL admin credentials.
# You should override this to match your own secret name/keys.
credentialsSecret:
  name: "pg-admin-credentials"
  userKey: "username"
  passwordKey: "password"

# Cloud SQL Auth Proxy sidecar configuration.
# Set enabled=true only when using Cloud SQL with the proxy sidecar.
cloudSqlProxy:
  enabled: false
  image:
    repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
    tag: "2.21.3"
  # Full instance connection name: project:region:instance
  instanceConnectionName: ""
  privateIp: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# PostgreSQL connection settings (target host for psql).
# When cloudSqlProxy.enabled=true the proxy usually listens on localhost.
connection:
  host: "localhost"
  port: "5432"
  sslmode: "disable"

# Runtime logging controls.
logging:
  # When true, psql echoes each SQL statement as it executes.
  verboseSql: false

# Roles to create (idempotently) before grants are applied.
# Example:
# roles:
#   - name: app_user
#     login: true
roles: []

# Databases to manage. For each database owner, pg-autogrant applies:
# - CONNECT, CREATE, TEMPORARY on database
# - USAGE, CREATE on public schema
# - ALL on existing tables/sequences/functions in public
# - ALTER DEFAULT PRIVILEGES for future objects in public
# Example:
# databases:
#   - name: app_db
#     owner: app_user
databases: []

# Extra role memberships beyond per-database defaults.
# Example:
# crossGrants:
#   - role: support_ro
#     memberOf: [app_user]
crossGrants: []

# Specific grants with explicit level control.
# level: database  -> GRANT {privileges} ON DATABASE "{database}" TO "{role}"
# level: schema    -> GRANT {privileges} ON SCHEMA "{schema}" TO "{role}"
# level: object    -> GRANT {privileges} ON ALL {objectType}S IN SCHEMA "{schema}" TO "{role}"
#                    + ALTER DEFAULT PRIVILEGES ...
# Example:
# specificGrants:
#   - role: support_ro
#     level: database
#     database: app_db
#     privileges: [CONNECT]
#   - role: support_ro
#     level: object
#     database: app_db
#     schema: public
#     objectType: [TABLE]
#     privileges: [SELECT]
specificGrants: []

resources:
  requests:
    memory: 32Mi
    cpu: 10m
  limits:
    memory: 64Mi
    cpu: 100m
