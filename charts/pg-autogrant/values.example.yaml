# pg-autogrant example values for a fictional project: acme-pay
#
# This file demonstrates one way to configure the chart.
# It is not used automatically.

schedule: "15 */6 * * *"

failedJobsHistoryLimit: 3
successfulJobsHistoryLimit: 1
activeDeadlineSeconds: 600
backoffLimit: 2
ttlSecondsAfterFinished: 900

image:
  repository: postgres
  tag: "18-alpine"

serviceAccountName: "acme-pg-admin"

credentialsSecret:
  name: "acme-pg-admin-credentials"
  userKey: "username"
  passwordKey: "password"

cloudSqlProxy:
  enabled: true
  image:
    repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
    tag: "2.21.2"
  instanceConnectionName: "acme-platform:europe-west1:acme-main-pg"
  privateIp: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

connection:
  host: "localhost"
  port: "5432"
  sslmode: "disable"

logging:
  verboseSql: true

roles:
  - name: acme_orders
    login: true
  - name: acme_payments
    login: true
  - name: acme_reporting_ro
    login: false

databases:
  - name: acme_orders
    owner: acme_orders
  - name: acme_payments
    owner: acme_payments

crossGrants:
  - role: acme_reporting_ro
    memberOf: [acme_orders, acme_payments]

specificGrants:
  - role: acme_reporting_ro
    level: database
    database: acme_orders
    privileges: [CONNECT]
  - role: acme_reporting_ro
    level: schema
    database: acme_orders
    schema: public
    privileges: [USAGE]
  - role: acme_reporting_ro
    level: object
    database: acme_orders
    schema: public
    objectType: [TABLE]
    privileges: [SELECT]
  - role: acme_reporting_ro
    level: database
    database: acme_payments
    privileges: [CONNECT]
  - role: acme_reporting_ro
    level: schema
    database: acme_payments
    schema: public
    privileges: [USAGE]
  - role: acme_reporting_ro
    level: object
    database: acme_payments
    schema: public
    objectType: [TABLE]
    privileges: [SELECT]

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 250m
