suite: ConfigMap — cross grants and specific grants
templates:
  - configmap.yaml
release:
  name: pg-autogrant
set:
  credentialsSecret:
    name: setup-db-credentials
    userKey: user_name
    passwordKey: password
tests:
  - it: renders cross-grant memberships
    set:
      roles: []
      databases: []
      crossGrants:
        - role: wallet_backend
          memberOf: [pacioli]
      specificGrants: []
    asserts:
      - matchRegex:
          path: data["grants.sql"]
          pattern: 'GRANT "pacioli" TO "wallet_backend"'

  - it: expands multiple memberOf entries
    set:
      roles: []
      databases: []
      crossGrants:
        - role: firefighter
          memberOf: [db_a, db_b, db_c]
      specificGrants: []
    asserts:
      - matchRegex:
          path: data["grants.sql"]
          pattern: 'GRANT "db_a" TO "firefighter"'
      - matchRegex:
          path: data["grants.sql"]
          pattern: 'GRANT "db_b" TO "firefighter"'
      - matchRegex:
          path: data["grants.sql"]
          pattern: 'GRANT "db_c" TO "firefighter"'

  - it: renders database-level specific grants in cluster SQL
    set:
      roles: []
      databases:
        - name: mydb
          owner: mydb
      crossGrants: []
      specificGrants:
        - role: support_ro
          level: database
          database: mydb
          privileges: [CONNECT]
    asserts:
      - matchRegex:
          path: data["grants.sql"]
          pattern: 'GRANT CONNECT ON DATABASE "mydb" TO "support_ro"'

  - it: renders schema-level specific grants in per-database SQL
    set:
      roles: []
      databases:
        - name: mydb
          owner: mydb
      crossGrants: []
      specificGrants:
        - role: support_ro
          level: schema
          database: mydb
          schema: public
          privileges: [USAGE]
    asserts:
      - matchRegex:
          path: data["grants-mydb.sql"]
          pattern: 'GRANT USAGE ON SCHEMA "public" TO "support_ro"'

  - it: renders object-level grants with ALTER DEFAULT PRIVILEGES
    set:
      roles: []
      databases:
        - name: mydb
          owner: mydb
      crossGrants: []
      specificGrants:
        - role: support_ro
          level: object
          database: mydb
          schema: public
          objectType: [TABLE]
          privileges: [SELECT]
    asserts:
      - matchRegex:
          path: data["grants-mydb.sql"]
          pattern: 'GRANT SELECT ON ALL TABLES IN SCHEMA "public" TO "support_ro"'
      - matchRegex:
          path: data["grants-mydb.sql"]
          pattern: 'ALTER DEFAULT PRIVILEGES IN SCHEMA "public" GRANT SELECT ON TABLES TO "support_ro"'

  - it: does not render grants for other databases in per-database SQL
    set:
      roles: []
      databases:
        - name: db_a
          owner: db_a
        - name: db_b
          owner: db_b
      crossGrants: []
      specificGrants:
        - role: support_ro
          level: schema
          database: db_a
          schema: public
          privileges: [USAGE]
    asserts:
      - matchRegex:
          path: data["grants-db_a.sql"]
          pattern: 'GRANT USAGE ON SCHEMA "public" TO "support_ro"'
      - notMatchRegex:
          path: data["grants-db_b.sql"]
          pattern: 'GRANT USAGE ON SCHEMA "public" TO "support_ro"'

  - it: renders multiple object types
    set:
      roles: []
      databases:
        - name: mydb
          owner: mydb
      crossGrants: []
      specificGrants:
        - role: auditor
          level: object
          database: mydb
          schema: public
          objectType: [TABLE, SEQUENCE]
          privileges: [SELECT]
    asserts:
      - matchRegex:
          path: data["grants-mydb.sql"]
          pattern: 'GRANT SELECT ON ALL TABLES IN SCHEMA "public" TO "auditor"'
      - matchRegex:
          path: data["grants-mydb.sql"]
          pattern: 'GRANT SELECT ON ALL SEQUENCES IN SCHEMA "public" TO "auditor"'
